<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit to Community</title>
    <link rel="stylesheet" href="../styles/main.css">
    <style>
        /* Supplementary layout styles */
        body { padding: 20px; max-width: 800px; margin: auto; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-family: "Roboto", sans-serif; font-weight: 600; }
        
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: "Roboto", sans-serif;
            box-sizing: border-box;
        }

        textarea { height: 200px; font-family: monospace; }

        button {
            background-color: #5794e5;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-family: "Roboto", sans-serif;
            font-weight: 600;
            border-radius: 4px;
        }

        button:hover { opacity: 0.9; }
        #status { margin-top: 20px; }
    </style>
</head>
<body>

    <h1 class="robot-600">Submit Your Code</h1>
    <p class="roboto-300">Share any HTML file with the community. If I review it, and it passes, I'll add it to the website!</p>

    <form id="submissionForm">
        <div class="form-group">
            <label for="username">Your Name/Handle</label>
            <input type="text" id="username" name="username" placeholder="e.g. GitUser" required>
        </div>

        <div class="form-group">
            <label for="projectTitle">Project Title</label>
            <input type="text" id="projectTitle" name="projectTitle" placeholder="e.g. BOIDS algorithm" required>
        </div>

        <div class="form-group">
            <label for="userCode">Your Code (HTML/JS)</label>
            <textarea id="userCode" name="userCode" placeholder="Your html code here" required></textarea>
        </div>

        <button type="submit" id="submitBtn">Submit for Review</button>
    </form>

    <div id="status" class="roboto-300"></div>

    <script>
        const form = document.getElementById('submissionForm');
        const status = document.getElementById('status');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            status.innerText = "Processing submission...";
            
            const formData = {
                username: document.getElementById('username').value,
                title: document.getElementById('projectTitle').value,
                code: document.getElementById('userCode').value
            };

            try {
                const response = await fetch('https://community-api.1962fenderjaguar.workers.dev', {
                    method: 'POST',
                    body: JSON.stringify(formData),
                    headers: { 'Content-Type': 'application/json' }
                });

                if (response.ok) {
                    status.innerHTML = "Success! Your submission has been sent for review. <a href='/'>Return home</a>";
                    form.reset();
                } else {
                    status.innerText = "Error: Could not submit. Please try again later.";
                }
            } catch (err) {
                status.innerText = "Connection error. Is the backend running?";
            }
        });
    </script>
</body>
</html>
