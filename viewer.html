<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Viewer</title>
    <link rel="stylesheet" href="../styles/main.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; display: flex; flex-direction: column; }
        .toolbar { padding: 10px 20px; background: #fff; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        iframe { flex-grow: 1; border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="toolbar">
        <a href="./" class="roboto-300" style="color: #5794e5;">&larr; Back to Gallery</a>
        <span id="projTitle" class="robot-600">Loading...</span>
        <span></span>
    </div>

    <!-- allow-scripts lets the code run, but stops it from touching domain -->
    <iframe id="viewerFrame" sandbox="allow-scripts allow-same-origin" title="Community Content"></iframe>

    <script>
        const params = new URLSearchParams(window.location.search);
        const file = params.get('file');
        
        if (file) {
            const frame = document.getElementById('viewerFrame');
            frame.src = `./submissions/${file}`;
            
            document.getElementById('projTitle').innerText = file.split('-')[0] + "'s Project";
        }
    </script>
</body>
</html>
